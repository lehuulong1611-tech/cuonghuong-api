<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cấp 2 VAT</title>

<style>
body{
    font-size:17px;
    margin:10px;
    font-family: Arial;
}

/* HEADER */
.header{
    margin-bottom:10px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    background:#f8f9fa;
}

.header .info{
    margin-bottom:8px;
}

/* BUTTON */
.btn-save{
    width:100%;
    padding:12px;
    background:#198754;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
}

th{
    background:#e9ecef;
    text-align:center;
}

td{
    vertical-align:middle;
}

/* VAT DATE */
.vat-date{
    color:green;
    font-weight:bold;
}

/* CHECKBOX */
input[type="checkbox"]{
    transform:scale(1.3);
}
</style>
</head>

<body>

<div class="header">
    <div class="info" id="infoKhach"></div>
    <button class="btn-save" onclick="saveVAT()">💾 LƯU VAT</button>
</div>

<div id="data"></div>

<script>

const url = new URLSearchParams(window.location.search);
const kh = url.get("kh");
const from = url.get("from");
const to = url.get("to");

let vatData = [];

function loadData(){

fetch(`/api/xlthue/chungtu?khachhang=${kh}&from=${from}&to=${to}`)
.then(r => r.json())
.then(data => {

    vatData = data;

    let info = data[0] || {};

    document.getElementById("infoKhach").innerHTML = `
        <b>Khách:</b> ${info.KhachHang || ""} |
        <b>MST:</b> ${info.MST || ""}
    `;

    let html = `
    <table>
        <tr>
            <th>✔</th>
            <th>Chứng từ</th>
            <th>Thành tiền</th>
            <th>Ngày VAT</th>
        </tr>
    `;

    data.forEach(r => {

        let checked = r.Tinhtrang === "đã xuất" ? "checked" : "";
        let ngay = r.Ngaycapnhat 
            ? `<span class="vat-date">${new Date(r.Ngaycapnhat).toLocaleDateString()}</span>`
            : "";

        html += `
        <tr>
            <td style="text-align:center;">
                <input type="checkbox" id="cb_${r.Chung_tu}" ${checked}>
            </td>

            <td style="color:blue; cursor:pointer;"
                onclick="openChiTiet('${r.Chung_tu}')">
                ${r.Chung_tu}
            </td>

            <td style="text-align:right;">
                ${Number(r.ThanhTien).toLocaleString('vi-VN')}
            </td>

            <td style="text-align:center;">
                ${ngay}
            </td>
        </tr>
        `;
    });

    html += `</table>`;

    document.getElementById("data").innerHTML = html;
});

}

function saveVAT(){

let list = [];

vatData.forEach(r => {

    let cb = document.getElementById("cb_" + r.Chung_tu);
    let checked = cb ? cb.checked : false;

    list.push({
        chung_tu: r.Chung_tu,
        checked: checked
    });
});

fetch("/api/xlthue/save-vat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
        khachhang: kh,
        data: list
    })
})
.then(r => r.json())
.then(() => {
    alert("Đã lưu VAT!");
    loadData();
});

}

loadData();

</script>

</body>
</html>
