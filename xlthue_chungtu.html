<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cấp 2 VAT</title>

<style>
body { font-size:16px; margin:10px; }

table {
    width:100%;
    border-collapse:collapse;
}

th,td {
    border:1px solid #ddd;
    padding:8px;
}

th { background:#f1f1f1; }

.vat {
    color:green;
    font-weight:bold;
}

.btn {
    padding:8px 12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>

<h3>Danh sách chứng từ VAT</h3>

<div id="data"></div>

<script>

const url = new URLSearchParams(window.location.search);
const kh = url.get("kh");
const from = url.get("from");
const to = url.get("to");

function loadData() {

fetch(`/api/xlthue/chungtu?khachhang=${kh}&from=${from}&to=${to}`)
.then(r => r.json())
.then(data => {

let html = `
<table>
<tr>
<th>✔</th>
<th>Khách</th>
<th>Chứng từ</th>
<th>Thành tiền</th>
<th>Ngày VAT</th>
<th>Lưu</th>
</tr>
`;

data.forEach(r => {

const checked = r.Tinhtrang === "đã xuất" ? "checked" : "";
const ngay = r.Ngaycapnhat ? `<span class="vat">${new Date(r.Ngaycapnhat).toLocaleDateString()}</span>` : "";

html += `
<tr>
<td>
<input type="checkbox" id="cb_${r.Chung_tu}" ${checked}>
</td>

<td>${r.KhachHang}</td>

<td onclick="openCT('${r.Chung_tu}')" style="color:blue;cursor:pointer;">
${r.Chung_tu}
</td>

<td style="text-align:right;">
${Number(r.ThanhTien).toLocaleString('vi-VN')}
</td>

<td>${ngay}</td>

<td>
<button class="btn" onclick="save('${r.KhachHang}','${r.Chung_tu}')">
Lưu
</button>
</td>
</tr>
`;
});

html += `</table>`;
document.getElementById("data").innerHTML = html;
});

}

function save(kh, ct) {

const cb = document.getElementById("cb_" + ct);
const status = cb.checked ? "đã xuất" : "đã hủy VAT";

fetch("/api/xlthue/save-vat", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
Makhach: kh,
Chung_tu: ct,
status: status
})
})
.then(r => r.json())
.then(() => loadData());
}

function openCT(ct){
alert("Cấp 3 chứng từ: " + ct);
}

loadData();

</script>

</body>
</html>
