<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra doanh số</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-3">
<div style="margin-bottom:15px;">
    <a href="index.html"
       style="
           display:inline-block;
           padding:8px 12px;
           background:#f1f1f1;
           border:1px solid #ccc;
           border-radius:6px;
           text-decoration:none;
           color:black;
           font-size:14px;
       ">
        ← Quay lại trang chủ
    </a>
</div>
    <h3 class="mb-3">Kiểm tra doanh số</h3>
<div style="margin-bottom:15px;">
    <button onclick="loadData('day')"
            style="padding:8px 12px; margin-right:10px; border:1px solid #ccc; border-radius:6px;">
        Ngày hiện tại
    </button>

    <button onclick="loadData('month')"
            style="padding:8px 12px; border:1px solid #ccc; border-radius:6px;">
        Tháng hiện tại
    </button>
</div>
    

    <button class="btn btn-success mb-3 w-100" onclick="loadData()">
        Tìm kiếm
    </button>

    <div id="data"></div>

    <script>
        function loadData() {
            let keyword = document.getElementById("search").value;

            fetch(`https://cuonghuong-api.onrender.com/api/doanhso?keyword=${keyword}`)
                .then(res => res.json())
                .then(data => {
                    let html = `
    <table style="width:100%; border-collapse:collapse; font-size:14px;">
        <thead>
            <tr style="background:#e9ecef;">
                <th style="border:1px solid #ccc; padding:8px;">Tên nhân viên</th>
                <th style="border:1px solid #ccc; padding:8px;">Số đơn bán</th>
                <th style="border:1px solid #ccc; padding:8px;">Đơn trả lại</th>
                <th style="border:1px solid #ccc; padding:8px;">Tổng tiền</th>
            </tr>
        </thead>
        <tbody>
`;

data.forEach(row => {
    html += `
        <tr>
            <td style="border:1px solid #ddd; padding:6px;">${row["Tennv"] ?? ""}</td>
            <td style="border:1px solid #ddd; padding:6px; text-align:center;">
                ${row["SoDonBan"] ?? 0}
            </td>
            <td style="border:1px solid #ddd; padding:6px; text-align:center;">
                ${row["SoDonTraLai"] ?? 0}
            </td>
            <td style="border:1px solid #ddd; padding:6px; text-align:right;">
                ${Number(row["TongTien"] ?? 0).toLocaleString('vi-VN')}
            </td>
        </tr>
    `;
});

                    html += "</table>";
                    document.getElementById("data").innerHTML = html;
                })
                .catch(err => {
                    document.getElementById("data").innerHTML =
                        "<div class='alert alert-danger'>Lỗi tải dữ liệu</div>";
                });
        }

        loadData('day');
    </script>

</body>
</html>
