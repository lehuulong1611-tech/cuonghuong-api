<html>
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm tra doanh số</title>
    <style>
    td, th {
        padding: 12px !important;
    }
</style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-3" style="font-size:16px;">
<div class="mb-3">
    <a href="index.html" class="btn btn-secondary w-100">
        ← Quay lại trang chủ
    </a>
</div>
    
<h3 style="font-size:22px;">Kiểm tra doanh số</h3>

<!-- RADIO -->
<div class="mb-3" style="font-size:16px;">
    <label class="me-3">
        <input type="radio" name="type" value="day" checked> Ngày hiện tại
    </label>

    <label class="me-3">
        <input type="radio" name="type" value="3days"> 3 ngày gần nhất
    </label>

    <label>
        <input type="radio" name="type" value="month"> Tháng hiện tại
    </label>

    <button class="btn btn-primary ms-2 mt-2 w-100" onclick="loadNhanVien()">
        Xem
    </button>
</div>

<div id="data"></div>

<script>

let currentType = "day";
let currentNhanVien = null;
let currentKhach = null;
let currentPage = 1;

// Lấy loại thời gian
function getType() {
    return document.querySelector('input[name="type"]:checked').value;
}

// ================= NHÂN VIÊN =================
function loadNhanVien() {
    currentType = getType();

    fetch(`/api/doanhso?type=${currentType}`)
        .then(res => res.json())
        .then(data => {
            let html = `<table class="table table-bordered" style="font-size:16px;">`;

            html += `
            <tr>
                <th>Nhân viên</th>
                <th>Đơn bán</th>
                <th>Đơn trả</th>
                <th>Thành tiền</th>
            </tr>`;

            data.forEach(r => {
                html += `
                <tr>
                    <td>
                        <a href="#" onclick="loadKhach('${r.Tennv}', 1); return false;">
                            ${r.Tennv}
                        </a>
                    </td>
                    <td>${r.SoDonBan}</td>
                    <td>${r.SoDonTraLai}</td>
                    <td>${Number(r.TongTien).toLocaleString('vi-VN')}</td>
                </tr>`;
            });

            html += `</table>`;
            document.getElementById("data").innerHTML = html;
        });
}

// ================= KHÁCH =================
function loadKhach(nv, page = 1) {
    currentNhanVien = nv;
    currentPage = page;

        fetch(`/api/doanhso/khachhang?nhanvien=${nv}&type=${currentType}&page=${page}`)
        .then(res => res.json())
        .then(data => {

            let html = `
            <button class="btn btn-secondary mb-2" onclick="loadNhanVien()">← Quay lại</button>
            <table class="table table-bordered" style="font-size:16px";>`;

            html += `
            <tr>
                <th>Khách hàng</th>
                <th>Đơn bán</th>
                <th>Đơn trả</th>
                <th>Thành tiền</th>
            </tr>`;

            data.forEach(r => {
                html += `
                <tr>
                    <td>
                        <a href="#" onclick="loadHang('${r.KhachHang}', 1); return false;">
                            ${r.KhachHang}
                        </a>
                    </td>
                    <td>${r.SoDonBan}</td>
                    <td>${r.SoDonTra}</td>
                    <td>${Number(r.ThanhTien).toLocaleString('vi-VN')}</td>
                </tr>`;
            });

            html += `</table>`;

            // PAGING
            html += `
            <div class="mt-2">
                <button class="btn btn-sm btn-outline-primary"
                    onclick="loadKhach('${currentNhanVien}', ${currentPage - 1})"
                    ${currentPage == 1 ? "disabled" : ""}>
                    Prev
                </button>

                <span class="mx-2">Trang ${currentPage}</span>

                <button class="btn btn-sm btn-outline-primary"
                    onclick="loadKhach('${currentNhanVien}', ${currentPage + 1})">
                    Next
                </button>
            </div>
            `;

            document.getElementById("data").innerHTML = html;
        });
}

// ================= HÀNG =================
function loadHang(kh, page = 1) {
    currentKhach = kh;
    currentPage = page;

    fetch(`/api/doanhso/hanghoa?nhanvien=${encodeURIComponent(currentNhanVien)}&khachhang=${encodeURIComponent(kh)}&type=${currentType}&page=${page}`)
        .then(res => res.json())
        .then(data => {

            let html = `
            <button class="btn btn-secondary mb-2" onclick="loadKhach('${currentNhanVien}', 1)">← Quay lại</button>
            <table class="table table-bordered" style="font-size:16px;">`;

            html += `
            <tr>
                <th>Tên hàng</th>
                <th>SL bán</th>
                <th>SL trả</th>
                <th>Đơn giá</th>
                <th>Thành tiền</th>
            </tr>`;

            data.forEach(r => {
                html += `
                <tr>
                    <td>${r.TenHang}</td>
                    <td>${r.SLBan}</td>
                    <td>${r.SLTra}</td>
                    <td>${Number(r.DonGia).toLocaleString('vi-VN')}</td>
                    <td>${Number(r.ThanhTien).toLocaleString('vi-VN')}</td>
                </tr>`;
            });

            html += `</table>`;

            // PAGING
            html += `
            <div class="mt-2">
                <button class="btn btn-sm btn-outline-primary"
                    onclick="loadHang('${currentKhach}', ${currentPage - 1})"
                    ${currentPage == 1 ? "disabled" : ""}>
                    Prev
                </button>

                <span class="mx-2">Trang ${currentPage}</span>

                <button class="btn btn-sm btn-outline-primary"
                    onclick="loadHang('${currentKhach}', ${currentPage + 1})">
                    Next
                </button>
            </div>
            `;

            document.getElementById("data").innerHTML = html;
        });
}

// LOAD MẶC ĐỊNH
window.onload = loadNhanVien;

</script>

</body>
</html>
