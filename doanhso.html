<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra doanh số</title>
</head>

<body style="margin:10px; font-size:16px;">

<div style="margin-bottom:15px;">
    <a href="index.html"
       style="display:inline-block; padding:8px 12px; background:#f1f1f1; border:1px solid #ccc; border-radius:6px; text-decoration:none; color:black;">
        ← Quay lại trang chủ
    </a>
</div>

<h3>Kiểm tra doanh số</h3>

<!-- RADIO -->
<div style="margin-bottom:15px;">
    <label><input type="radio" name="type" value="day" checked> Ngày hiện tại</label>
    <label style="margin-left:10px;"><input type="radio" name="type" value="3days"> 3 ngày gần nhất</label>
    <label style="margin-left:10px;"><input type="radio" name="type" value="month"> Tháng hiện tại</label>

    <div style="margin-top:10px;">
        <button onclick="loadNhanVien()">Xem</button>
    </div>
</div>

<div id="data"></div>

<script>

let currentType = "day";
let currentNhanVien = null;
let currentKhach = null;
let currentPage = 1;

function getType() {
    return document.querySelector('input[name="type"]:checked').value;
}

// ================= NHÂN VIÊN =================
function loadNhanVien() {
    currentType = getType();

    fetch(`/api/doanhso?type=${currentType}`)
        .then(res => res.json())
        .then(data => {

            let tong = 0;

            let html = `
            <table style="width:100%; border-collapse:collapse;">
            <tr style="background:#eee;">
                <th style="border:1px solid #ccc; padding:10px;">Nhân viên</th>
                <th style="border:1px solid #ccc;">Đơn bán</th>
                <th style="border:1px solid #ccc;">Đơn trả</th>
                <th style="border:1px solid #ccc;">Thành tiền</th>
            </tr>
            `;

            data.forEach(r => {
                tong += Number(r.TongTien || 0);

                html += `
                <tr>
                    <td style="border:1px solid #ddd; padding:10px;">
                        <span class="nv" data-name="${r.Tennv}" style="color:blue; cursor:pointer;">
                            ${r.Tennv}
                        </span>
                    </td>
                    <td style="border:1px solid #ddd; text-align:center;">${r.SoDonBan}</td>
                    <td style="border:1px solid #ddd; text-align:center;">${r.SoDonTraLai}</td>
                    <td style="border:1px solid #ddd; text-align:right;">
                        ${Number(r.TongTien).toLocaleString('vi-VN')}
                    </td>
                </tr>
                `;
            });

            html += `
            <tr style="font-weight:bold; background:#f9f9f9;">
                <td style="border:1px solid #ccc; padding:10px;">Tổng</td>
                <td></td>
                <td></td>
                <td style="border:1px solid #ccc; text-align:right;">
                    ${tong.toLocaleString('vi-VN')}
                </td>
            </tr>
            </table>
            `;

            document.getElementById("data").innerHTML = html;

            // GÁN CLICK
            document.querySelectorAll(".nv").forEach(el => {
                el.onclick = () => loadKhach(el.dataset.name, 1);
            });
        });
}

// ================= KHÁCH =================
function loadKhach(nv, page = 1) {
    currentNhanVien = nv;
    currentPage = page;

    fetch(`/api/doanhso/khachhang?nhanvien=${encodeURIComponent(nv)}&type=${currentType}&page=${page}`)
        .then(res => res.json())
        .then(data => {

            let tong = 0;

            let html = `
            <button onclick="loadNhanVien()">← Quay lại</button>

            <table style="width:100%; border-collapse:collapse;">
            <tr style="background:#eee;">
                <th style="border:1px solid #ccc;">Khách hàng</th>
                <th style="border:1px solid #ccc;">Đơn bán</th>
                <th style="border:1px solid #ccc;">Đơn trả</th>
                <th style="border:1px solid #ccc;">Thành tiền</th>
            </tr>
            `;

            data.forEach(r => {
                tong += Number(r.ThanhTien || 0);

                html += `
                <tr>
                    <td style="border:1px solid #ddd; padding:10px;">
                        <span class="kh" data-name="${r.KhachHang}" style="color:blue; cursor:pointer;">
                            ${r.KhachHang}
                        </span>
                    </td>
                    <td style="border:1px solid #ddd; text-align:center;">${r.SoDonBan}</td>
                    <td style="border:1px solid #ddd; text-align:center;">${r.SoDonTra}</td>
                    <td style="border:1px solid #ddd; text-align:right;">
                        ${Number(r.ThanhTien).toLocaleString('vi-VN')}
                    </td>
                </tr>
                `;
            });

            html += `
            <tr style="font-weight:bold; background:#f9f9f9;">
                <td>Tổng</td><td></td><td></td>
                <td style="text-align:right;">${tong.toLocaleString('vi-VN')}</td>
            </tr>
            </table>
            `;

            // PAGING
            html += `
            <div style="text-align:center; margin-top:10px;">
                <button onclick="loadKhach(currentNhanVien, ${page-1})" ${page==1?"disabled":""}>← Trước</button>
                <span>Trang ${page}</span>
                <button onclick="loadKhach(currentNhanVien, ${page+1})" ${data.length<15?"disabled":""}>Sau →</button>
            </div>
            `;

            document.getElementById("data").innerHTML = html;

            // CLICK KHÁCH
            document.querySelectorAll(".kh").forEach(el => {
                el.onclick = () => loadHang(el.dataset.name, 1);
            });
        });
}

// ================= HÀNG =================
function loadHang(kh, page = 1) {
    currentKhach = kh;
    currentPage = page;

    fetch(`/api/doanhso/hanghoa?nhanvien=${encodeURIComponent(currentNhanVien)}&khachhang=${encodeURIComponent(kh)}&type=${currentType}&page=${page}`)
        .then(res => res.json())
        .then(data => {

            let tong = 0;

            let html = `
            <button onclick="loadKhach(currentNhanVien,1)">← Quay lại</button>

            <table style="width:100%; border-collapse:collapse;">
            <tr style="background:#eee;">
                <th>Tên hàng</th>
                <th>SL bán</th>
                <th>SL trả</th>
                <th>Đơn giá</th>
                <th>Thành tiền</th>
            </tr>
            `;

            data.forEach(r => {
                tong += Number(r.ThanhTien || 0);

                html += `
                <tr>
                    <td style="border:1px solid #ddd; padding:10px;">${r.TenHang}</td>
                    <td style="border:1px solid #ddd; text-align:center;">${r.SLBan}</td>
                    <td style="border:1px solid #ddd; text-align:center;">${r.SLTra}</td>
                    <td style="border:1px solid #ddd; text-align:right;">
                        ${Number(r.DonGia).toLocaleString('vi-VN')}
                    </td>
                    <td style="border:1px solid #ddd; text-align:right;">
                        ${Number(r.ThanhTien).toLocaleString('vi-VN')}
                    </td>
                </tr>
                `;
            });

            html += `
            <tr style="font-weight:bold; background:#f9f9f9;">
                <td colspan="4">Tổng</td>
                <td style="text-align:right;">${tong.toLocaleString('vi-VN')}</td>
            </tr>
            </table>
            `;

            html += `
            <div style="text-align:center; margin-top:10px;">
                <button onclick="loadHang(currentKhach, ${page-1})" ${page==1?"disabled":""}>← Trước</button>
                <span>Trang ${page}</span>
                <button onclick="loadHang(currentKhach, ${page+1})" ${data.length<15?"disabled":""}>Sau →</button>
            </div>
            `;

            document.getElementById("data").innerHTML = html;
        });
}

// LOAD
loadNhanVien();

</script>

</body>
</html>
