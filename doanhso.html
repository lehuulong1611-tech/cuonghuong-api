<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra doanh số</title>
</head>

<body style="margin:10px; font-size:16px;">

<div style="margin-bottom:15px;">
    <a href="index.html"
       style="display:inline-block; padding:8px 12px; background:#f1f1f1; border:1px solid #ccc; border-radius:6px; text-decoration:none; color:black;">
        ← Quay lại trang chủ
    </a>
</div>

<h3>Kiểm tra doanh số</h3>

<div style="margin-bottom:15px;">
    <label><input type="radio" name="type" value="day" checked> Ngày hiện tại</label>
    <label style="margin-left:10px;"><input type="radio" name="type" value="3days"> 3 ngày gần nhất</label><br>
    <label style="margin-left:10px;"><input type="radio" name="type" value="month"> Tháng hiện tại</label>

    <div style="margin-top:10px;">
        <button onclick="loadNhanVien()">Xem</button>
    </div>
</div>

<div id="data"></div>

<script>

let currentType = "day";
let currentNhanVien = null;
let currentKhach = null;
let currentPage = 1;

let dataNhanVien = [];
let dataKhach = [];
let dataHang = [];

function getType() {
    return document.querySelector('input[name="type"]:checked').value;
}

// ================= NHÂN VIÊN =================
function loadNhanVien() {
    currentType = getType();

    fetch(`/api/doanhso?type=${currentType}`)
        .then(res => res.json())
        .then(data => {
            dataNhanVien = data;
            renderNhanVien(data);
        });
}

function renderNhanVien(data) {
    let tong = 0;

    let html = `
    <table style="width:100%; border-collapse:collapse;">
        <tr style="background:#eee;">
            <th>Nhân viên</th>
            <th>Đơn bán</th>
            <th>Đơn trả</th>
            <th>Thành tiền</th>
        </tr>
        <tr>
            <th><input onkeyup="filterNhanVien()" id="f_nv"></th>
            <th><input onkeyup="filterNhanVien()" id="f_db"></th>
            <th><input onkeyup="filterNhanVien()" id="f_dt"></th>
            <th><input onkeyup="filterNhanVien()" id="f_tt"></th>
        </tr>
    `;

    data.forEach(r => {
        tong += Number(r.TongTien || 0);

        html += `
        <tr>
            <td style="padding:10px; border:1px solid #ddd;">
                <span class="nv" data-name="${r.Tennv}" style="color:blue; cursor:pointer;">
                    ${r.Tennv}
                </span>
            </td>
            <td style="text-align:center;">${r.SoDonBan}</td>
            <td style="text-align:center;">${r.SoDonTraLai}</td>
            <td style="text-align:right;">${Number(r.TongTien).toLocaleString('vi-VN')}</td>
        </tr>
        `;
    });

    html += `
    <tr style="font-weight:bold; background:#f9f9f9;">
        <td>Tổng</td><td></td><td></td>
        <td style="text-align:right;">${tong.toLocaleString('vi-VN')}</td>
    </tr>
    </table>
    `;

    document.getElementById("data").innerHTML = html;

    document.querySelectorAll(".nv").forEach(el => {
        el.onclick = () => loadKhach(el.dataset.name, 1);
    });
}

function filterNhanVien() {
    let ten = document.getElementById("f_nv").value.toLowerCase();
    let filtered = dataNhanVien.filter(r =>
        (!ten || r.Tennv.toLowerCase().includes(ten))
    );
    renderNhanVien(filtered);
}

// ================= KHÁCH =================
function loadKhach(nv, page = 1) {
    currentNhanVien = nv;
    currentPage = page;

    fetch(`/api/doanhso/khachhang?nhanvien=${encodeURIComponent(nv)}&type=${currentType}&page=${page}`)
        .then(res => res.json())
        .then(data => {
            dataKhach = data;
            renderKhach(data);
        });
}

function renderKhach(data) {
    let tong = 0;

    let html = `
    <button onclick="loadNhanVien()">← Quay lại</button>

    <table style="width:100%; border-collapse:collapse;">
        <tr style="background:#eee;">
            <th>Khách hàng</th>
            <th>Đơn bán</th>
            <th>Đơn trả</th>
            <th>Thành tiền</th>
        </tr>
        <tr>
            <th><input onkeyup="filterKhach()" id="f_kh"></th>
            <th></th><th></th><th></th>
        </tr>
    `;

    data.forEach(r => {
        tong += Number(r.ThanhTien || 0);

        html += `
        <tr>
            <td style="padding:10px;">
                <span class="kh" data-name="${r.KhachHang}" style="color:blue; cursor:pointer;">
                    ${r.KhachHang}
                </span>
            </td>
            <td style="text-align:center;">${r.SoDonBan}</td>
            <td style="text-align:center;">${r.SoDonTra}</td>
            <td style="text-align:right;">${Number(r.ThanhTien).toLocaleString('vi-VN')}</td>
        </tr>
        `;
    });

    html += `
    <tr style="font-weight:bold;">
        <td>Tổng</td><td></td><td></td>
        <td style="text-align:right;">${tong.toLocaleString('vi-VN')}</td>
    </tr>
    </table>
    `;

    html += `
    <div style="text-align:center; margin-top:10px;">
        <button onclick="loadKhach(currentNhanVien, ${currentPage-1})" ${currentPage==1?"disabled":""}>← Trước</button>
        <span>Trang ${currentPage}</span>
        <button onclick="loadKhach(currentNhanVien, ${currentPage+1})" ${data.length<15?"disabled":""}>Sau →</button>
    </div>
    `;

    document.getElementById("data").innerHTML = html;

    document.querySelectorAll(".kh").forEach(el => {
        el.onclick = () => loadHang(el.dataset.name, 1);
    });
}

function filterKhach() {
    let ten = document.getElementById("f_kh").value.toLowerCase();
    let filtered = dataKhach.filter(r =>
        (!ten || r.KhachHang.toLowerCase().includes(ten))
    );
    renderKhach(filtered);
}

// ================= HÀNG =================
function loadHang(kh, page = 1) {
    currentKhach = kh;
    currentPage = page;

    fetch(`/api/doanhso/hanghoa?nhanvien=${encodeURIComponent(currentNhanVien)}&khachhang=${encodeURIComponent(kh)}&type=${currentType}&page=${page}`)
        .then(res => res.json())
        .then(data => {
            dataHang = data;
            renderHang(data);
        });
}

function renderHang(data) {
    let tong = 0;

    let html = `
    <button onclick="loadKhach(currentNhanVien,1)">← Quay lại</button>

    <table style="width:100%; border-collapse:collapse;">
        <tr style="background:#eee;">
            <th>Tên hàng</th>
            <th>SL bán</th>
            <th>SL trả</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>
        <tr>
            <th><input onkeyup="filterHang()" id="f_h"></th>
            <th></th><th></th><th></th><th></th>
        </tr>
    `;

    data.forEach(r => {
        tong += Number(r.ThanhTien || 0);

        html += `
        <tr>
            <td style="padding:10px;">${r.TenHang}</td>
            <td style="text-align:center;">${r.SLBan}</td>
            <td style="text-align:center;">${r.SLTra}</td>
            <td style="text-align:right;">${Number(r.DonGia).toLocaleString('vi-VN')}</td>
            <td style="text-align:right;">${Number(r.ThanhTien).toLocaleString('vi-VN')}</td>
        </tr>
        `;
    });

    html += `
    <tr style="font-weight:bold;">
        <td colspan="4">Tổng</td>
        <td style="text-align:right;">${tong.toLocaleString('vi-VN')}</td>
    </tr>
    </table>
    `;

    html += `
    <div style="text-align:center; margin-top:10px;">
        <button onclick="loadHang(currentKhach, ${currentPage-1})" ${currentPage==1?"disabled":""}>← Trước</button>
        <span>Trang ${currentPage}</span>
        <button onclick="loadHang(currentKhach, ${currentPage+1})" ${data.length<15?"disabled":""}>Sau →</button>
    </div>
    `;

    document.getElementById("data").innerHTML = html;
}

function filterHang() {
    let ten = document.getElementById("f_h").value.toLowerCase();
    let filtered = dataHang.filter(r =>
        (!ten || r.TenHang.toLowerCase().includes(ten))
    );
    renderHang(filtered);
}

loadNhanVien();

</script>

</body>
</html>
