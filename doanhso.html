<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra doanh số</title>
</head>

<body style="margin:10px; font-size:16px;">

<div style="margin-bottom:15px;">
    <a href="index.html"
       style="display:inline-block; padding:8px 12px; background:#f1f1f1; border:1px solid #ccc; border-radius:6px; text-decoration:none; color:black;">
        ← Quay lại trang chủ
    </a>
</div>

<h3 style="margin-bottom:10px;">Kiểm tra doanh số</h3>

<!-- RADIO -->
<div style="margin-bottom:15px;">
    <label style="margin-right:15px;">
        <input type="radio" name="type" value="day" checked> Ngày hiện tại
    </label>

    <label style="margin-right:15px;">
        <input type="radio" name="type" value="3days"> 3 ngày gần nhất
    </label>

    <label>
        <input type="radio" name="type" value="month"> Tháng hiện tại
    </label>

    <div style="margin-top:10px;">
        <button onclick="loadNhanVien()"
            style="padding:10px 14px; border:1px solid #ccc; border-radius:6px; background:#f1f1f1;">
            Xem
        </button>
    </div>
</div>

<div id="data"></div>

<script>

let currentType = "day";
let currentNhanVien = null;
let currentKhach = null;
let currentPage = 1;

// lấy loại
function getType() {
    return document.querySelector('input[name="type"]:checked').value;
}

// ================= NHÂN VIÊN =================
function loadNhanVien() {
    currentType = getType();

    fetch(`/api/doanhso?type=${currentType}`)
        .then(res => res.json())
        .then(data => {

            let html = `
            <table style="width:100%; border-collapse:collapse;">
                <tr style="background:#e9ecef;">
                    <th style="border:1px solid #ccc; padding:10px;">Nhân viên</th>
                    <th style="border:1px solid #ccc; padding:10px;">Đơn bán</th>
                    <th style="border:1px solid #ccc; padding:10px;">Đơn trả</th>
                    <th style="border:1px solid #ccc; padding:10px;">Thành tiền</th>
                </tr>
            `;

            data.forEach(r => {
                html += `
                <tr>
                    <td style="border:1px solid #ddd; padding:10px;">
                        <span style="color:blue; cursor:pointer;"
                            onclick="loadKhach(${JSON.stringify(r.Tennv)},1)">
                            ${r.Tennv}
                        </span>
                    </td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:center;">${r.SoDonBan}</td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:center;">${r.SoDonTraLai}</td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:right;">
                        ${Number(r.TongTien).toLocaleString('vi-VN')}
                    </td>
                </tr>`;
            });

            html += `</table>`;
            document.getElementById("data").innerHTML = html;
        });
}

// ================= KHÁCH =================
function loadKhach(nv, page = 1) {
    currentNhanVien = nv;
    currentPage = page;

    fetch(`/api/doanhso/khachhang?nhanvien=${encodeURIComponent(nv)}&type=${currentType}&page=${page}`)
        .then(res => res.json())
        .then(data => {

            let html = `
            <button onclick="loadNhanVien()"
                style="margin-bottom:10px; padding:8px 12px; border:1px solid #ccc; border-radius:6px; background:#f1f1f1;">
                ← Quay lại
            </button>

            <table style="width:100%; border-collapse:collapse;">
                <tr style="background:#e9ecef;">
                    <th style="border:1px solid #ccc; padding:10px;">Khách hàng</th>
                    <th style="border:1px solid #ccc; padding:10px;">Đơn bán</th>
                    <th style="border:1px solid #ccc; padding:10px;">Đơn trả</th>
                    <th style="border:1px solid #ccc; padding:10px;">Thành tiền</th>
                </tr>
            `;

            data.forEach(r => {
                html += `
                <tr>
                    <td style="border:1px solid #ddd; padding:10px;">
                        <span style="color:blue; cursor:pointer;"
                            onclick="loadHang(${JSON.stringify(r.KhachHang)},1)">
                            ${r.KhachHang}
                        </span>
                    </td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:center;">${r.SoDonBan}</td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:center;">${r.SoDonTra}</td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:right;">
                        ${Number(r.ThanhTien).toLocaleString('vi-VN')}
                    </td>
                </tr>`;
            });

            html += `</table>`;

            // PAGING
            html += `
            <div style="margin-top:10px; text-align:center;">
                <button onclick="loadKhach('${currentNhanVien}', ${currentPage-1})"
                    ${currentPage==1 ? "disabled" : ""}>
                    ← Trước
                </button>

                <span style="margin:0 10px;">Trang ${currentPage}</span>

                <button onclick="loadKhach('${currentNhanVien}', ${currentPage+1})"
                    ${data.length < 15 ? "disabled" : ""}>
                    Sau →
                </button>
            </div>
            `;

            document.getElementById("data").innerHTML = html;
        });
}

// ================= HÀNG =================
function loadHang(kh, page = 1) {
    currentKhach = kh;
    currentPage = page;

    fetch(`/api/doanhso/hanghoa?nhanvien=${encodeURIComponent(currentNhanVien)}&khachhang=${encodeURIComponent(kh)}&type=${currentType}&page=${page}`)
        .then(res => res.json())
        .then(data => {

            let html = `
            <button onclick="loadKhach('${currentNhanVien}',1)"
                style="margin-bottom:10px; padding:8px 12px; border:1px solid #ccc; border-radius:6px; background:#f1f1f1;">
                ← Quay lại
            </button>

            <table style="width:100%; border-collapse:collapse;">
                <tr style="background:#e9ecef;">
                    <th style="border:1px solid #ccc; padding:10px;">Tên hàng</th>
                    <th style="border:1px solid #ccc; padding:10px;">SL bán</th>
                    <th style="border:1px solid #ccc; padding:10px;">SL trả</th>
                    <th style="border:1px solid #ccc; padding:10px;">Đơn giá</th>
                    <th style="border:1px solid #ccc; padding:10px;">Thành tiền</th>
                </tr>
            `;

            data.forEach(r => {
                html += `
                <tr>
                    <td style="border:1px solid #ddd; padding:10px;">${r.TenHang}</td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:center;">${r.SLBan}</td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:center;">${r.SLTra}</td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:right;">
                        ${Number(r.DonGia).toLocaleString('vi-VN')}
                    </td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:right;">
                        ${Number(r.ThanhTien).toLocaleString('vi-VN')}
                    </td>
                </tr>`;
            });

            html += `</table>`;

            // PAGING
            html += `
            <div style="margin-top:10px; text-align:center;">
                <button onclick="loadHang('${currentKhach}', ${currentPage-1})"
                    ${currentPage==1 ? "disabled" : ""}>
                    ← Trước
                </button>

                <span style="margin:0 10px;">Trang ${currentPage}</span>

                <button onclick="loadHang('${currentKhach}', ${currentPage+1})"
                    ${data.length < 15 ? "disabled" : ""}>
                    Sau →
                </button>
            </div>
            `;

            document.getElementById("data").innerHTML = html;
        });
}

// LOAD
loadNhanVien();

</script>

</body>
</html>
