<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra doanh số</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-3">
<div style="margin-bottom:15px;">
    <a href="index.html"
       style="
           display:inline-block;
           padding:8px 12px;
           background:#f1f1f1;
           border:1px solid #ccc;
           border-radius:6px;
           text-decoration:none;
           color:black;
           font-size:14px;
       ">
        ← Quay lại trang chủ
    </a>
</div>
    <h3 class="mb-3">Kiểm tra doanh số</h3>

    <div class="mb-3">
        <input type="text" id="search" class="form-control" placeholder="Nhập mã hàng / tên hàng">
    </div>

    <button class="btn btn-success mb-3 w-100" onclick="loadData()">
        Tìm kiếm
    </button>

    <div id="data"></div>

    <script>
        function loadData() {
            let keyword = document.getElementById("search").value;

            fetch(`https://cuonghuong-api.onrender.com/api/doanhso?keyword=${keyword}`)
                .then(res => res.json())
                .then(data => {
                    let html = "<table class='table table-bordered table-striped'>";

                    if (data.length > 0) {
                        html += "<thead><tr>";

                        for (let key in data[0]) {
                            html += `<th>${key}</th>`;
                        }

                        html += "</tr></thead><tbody>";

                        data.forEach(row => {
                            html += "<tr>";
                            for (let key in row) {
                                html += `<td>${row[key]}</td>`;
                            }
                            html += "</tr>";
                        });

                        html += "</tbody>";
                    } else {
                        html += "<tr><td>Không có dữ liệu</td></tr>";
                    }

                    html += "</table>";
                    document.getElementById("data").innerHTML = html;
                })
                .catch(err => {
                    document.getElementById("data").innerHTML =
                        "<div class='alert alert-danger'>Lỗi tải dữ liệu</div>";
                });
        }

        loadData();
    </script>

</body>
</html>
