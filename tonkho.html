<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra tồn kho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-3">

    <h3>Tồn kho</h3>

    <input type="text" id="search" class="form-control mb-3" placeholder="Nhập tên hàng">
    <button class="btn btn-primary mb-3" onclick="loadData()">Tìm kiếm</button>

    <div id="data"></div>

    <script>
        function loadData() {
            let keyword = document.getElementById("search").value;

            fetch(`https://cuonghuong-api.onrender.com/api/tonkho?keyword=${keyword}`)
                .then(res => res.json())
                .then(data => {
                    let html = "<table class='table table-bordered'>";

                    if (data.length > 0) {
                        html += "<tr>";
                        for (let key in data[0]) {
                            html += `<th>${key}</th>`;
                        }
                        html += "</tr>";

                        data.forEach(row => {
                            html += "<tr>";
                            for (let key in row) {
                                html += `<td>${row[key]}</td>`;
                            }
                            html += "</tr>";
                        });
                    }

                    html += "</table>";
                    document.getElementById("data").innerHTML = html;
                });
        }

        loadData();
    </script>

</body>
</html>
