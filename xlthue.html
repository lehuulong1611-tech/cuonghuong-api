<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn VAT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-size: 15px; }

        /* TÊN KHÁCH TO */
        .ten-khach {
            font-size: 17px;
            font-weight: 600;
            color: #0d6efd;
            cursor: pointer;
        }

        /* MST NHỎ */
        .mst {
            font-size: 13px;
            color: #666;
        }

        /* TIỀN NHỎ */
        .tien {
            font-size: 14px;
        }

        table th {
            background: #e9ecef;
        }
    </style>
</head>

<body class="container mt-3">

<!-- BACK -->
<div style="margin-bottom:10px;">
    <a href="index.html"
       style="display:inline-block;padding:8px 12px;background:#f1f1f1;border:1px solid #ccc;border-radius:6px;text-decoration:none;color:black;">
        ← Trang chủ
    </a>
</div>

<h4>Danh sách khách VAT</h4>

<!-- FILTER -->
<div class="row mb-2">
    <div class="col-6">
        <label>Từ ngày</label>
        <input type="date" id="from" class="form-control">
    </div>
    <div class="col-6">
        <label>Đến ngày</label>
        <input type="date" id="to" class="form-control">
    </div>
</div>

<button class="btn btn-primary w-100 mb-3" onclick="loadData(1)">
    Xem dữ liệu
</button>

<div id="data"></div>

<script>

let pageSize = 10;
let currentPage = 1;
let allData = [];

function setDefaultDate() {
    let today = new Date().toISOString().split("T")[0];
    document.getElementById("from").value = today;
    document.getElementById("to").value = today;
}

function loadData(page = 1) {
    currentPage = page;

    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    fetch(`/api/xlthue/khach?from=${from}&to=${to}`)
        .then(res => res.json())
        .then(data => {

            allData = data;

            renderPage(page);
        });
}

function renderPage(page) {
    let start = (page - 1) * pageSize;
    let end = start + pageSize;

    let pageData = allData.slice(start, end);

    let tong = 0;

    let html = `
    <table class="table table-bordered">
        <tr>
            <th>Khách hàng</th>
            <th>MST</th>
            <th>Đơn bán</th>
            <th>Đơn trả</th>
            <th>Tổng tiền</th>
        </tr>
    `;

    pageData.forEach(r => {

        tong += Number(r.TongTien || 0);

        html += `
        <tr>
            <td>
                <div class="ten-khach">
                    ${r.Ten_HoaDon || r.KhachHang}
                </div>
            </td>

            <td class="mst">${r.MST || ""}</td>

            <td style="text-align:center;">
                ${r.SoDonBan || ""}
            </td>

            <td style="text-align:center;">
                ${r.SoDonTra || ""}
            </td>

            <td class="tien" style="text-align:right;">
                ${Number(r.TongTien || 0).toLocaleString('vi-VN')}
            </td>
        </tr>`;
    });

    html += `
    <tr style="font-weight:bold;background:#f8f9fa;">
        <td colspan="4">TỔNG TRANG</td>
        <td style="text-align:right;">
            ${tong.toLocaleString('vi-VN')}
        </td>
    </tr>
    </table>
    `;

    // PAGING
    let totalPages = Math.ceil(allData.length / pageSize);

    html += `
    <div style="text-align:center;margin-top:10px;">
        <button class="btn btn-secondary"
            onclick="renderPage(${page - 1})"
            ${page <= 1 ? "disabled" : ""}>
            ← Trước
        </button>

        <span style="margin:0 10px;">
            Trang ${page} / ${totalPages}
        </span>

        <button class="btn btn-secondary"
            onclick="renderPage(${page + 1})"
            ${page >= totalPages ? "disabled" : ""}>
            Sau →
        </button>
    </div>
    `;

    document.getElementById("data").innerHTML = html;
}

setDefaultDate();
loadData();

</script>

</body>
</html>
