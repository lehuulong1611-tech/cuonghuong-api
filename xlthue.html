<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn VAT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-size: 16px; }
        table { font-size: 15px; }
        th { background: #e9ecef; }
    </style>
</head>

<body class="container mt-3">

<!-- BACK -->
<div style="margin-bottom:10px;">
    <a href="index.html"
       style="display:inline-block;padding:8px 12px;background:#f1f1f1;border:1px solid #ccc;border-radius:6px;text-decoration:none;color:black;">
        ← Trang chủ
    </a>
</div>

<h4>Danh sách khách VAT</h4>

<!-- FILTER NGÀY -->
<div class="row mb-2">
    <div class="col-6">
        <label>Từ ngày</label>
        <input type="date" id="from" class="form-control">
    </div>
    <div class="col-6">
        <label>Đến ngày</label>
        <input type="date" id="to" class="form-control">
    </div>
</div>

<button class="btn btn-primary w-100 mb-3" onclick="loadData()">
    Xem dữ liệu
</button>

<div id="data"></div>

<script>

let currentPage = 1;

function setDefaultDate() {
    let today = new Date().toISOString().split("T")[0];
    document.getElementById("from").value = today;
    document.getElementById("to").value = today;
}

function loadData(page = 1) {
    currentPage = page;

    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    fetch(`/api/xlthue/khach?from=${from}&to=${to}`)
        .then(res => res.json())
        .then(data => {

            let tong = 0;

            let html = `
            <table class="table table-bordered">
                <tr>
                    <th>Khách hàng</th>
                    <th>MST</th>
                    <th>Đơn bán</th>
                    <th>Đơn trả</th>
                    <th>Tổng tiền</th>
                </tr>
            `;

            data.forEach(r => {
                tong += Number(r.TongTien || 0);

                html += `
                <tr>
                    <td>
                        <span style="color:blue; cursor:pointer;"
                              onclick="loadChiTiet('${r.KhachHang}')">
                            ${r.Ten_HoaDon || r.KhachHang}
                        </span>
                    </td>
                    <td>${r.MST || ""}</td>
                    <td style="text-align:center;">${r.SoDonBan || ""}</td>
                    <td style="text-align:center;">${r.SoDonTra || ""}</td>
                    <td style="text-align:right;">
                        ${Number(r.TongTien || 0).toLocaleString('vi-VN')}
                    </td>
                </tr>`;
            });

            html += `
            <tr style="font-weight:bold;background:#f8f9fa;">
                <td colspan="4">TỔNG</td>
                <td style="text-align:right;">
                    ${tong.toLocaleString('vi-VN')}
                </td>
            </tr>
            </table>
            `;

            document.getElementById("data").innerHTML = html;
        });
}

function loadChiTiet(khach) {
    alert("Sang cấp 2: " + khach);
    // sau này mình nối sang API cấp 2 ở đây
}

setDefaultDate();
loadData();

</script>

</body>
</html>
